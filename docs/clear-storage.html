<!DOCTYPE html>
<html>
<head><title>Clearing...</title></head>
<body>
<script>
var keys = Object.keys(localStorage);
var count = 0;
keys.forEach(function(k) {
  if (k.startsWith('enerband_')) {
    localStorage.removeItem(k);
    count++;
  }
});
document.body.innerHTML = '<p>Cleared ' + count + ' items. Redirecting...</p>';
setTimeout(function() {
  window.location.href = 'home.html';
}, 500);
</script>
</body>
</html>
